project:
  type: default
  output-dir: _book
  render:
    - informe.qmd

lang: es

execute:
  echo: false
  warning: false
  message: false

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true
    number-depth: 2
  typst:
    papersize: a4
    margin:
      x: 2.2cm
      y: 2.5cm
    mainfont: "Liberation Sans"
    fontsize: 10.5pt
    toc: true
    toc-title: "Índice"
    number-sections: true
    number-depth: 2
    include-in-header:
      - estilo-gem.typ
